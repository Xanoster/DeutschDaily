      { id: 'gr7', t: 'greet', de: 'Wie war dein Wochenende?', en: 'How was your weekend?', ph: 'vee var dine VO-khen-EN-deh', use: 'Classic Monday morning small talk with colleagues', lv: 'A2' },
      { id: 'gr8', t: 'greet', de: 'Ich bin neu hier.', en: "I'm new here.", ph: 'ikh bin noy HEER', use: 'Perfect opener when meeting neighbors, colleagues, or locals', lv: 'A1' },
      { id: 'gr9', t: 'greet', de: 'Woher kommst du?', en: 'Where are you from?', ph: 'vo-HAIR KOMST doo', use: 'Getting to know someone - natural and friendly', lv: 'A1' },
      { id: 'gr10', t: 'greet', de: 'Ich komme aus Indien.', en: "I'm from India.", ph: 'ikh KOM-eh ows IN-dee-en', use: 'Swap country name: Türkei, Pakistan, Iran, etc.', lv: 'A1' },
      { id: 'gr11', t: 'greet', de: 'Wie lange wohnst du schon hier?', en: 'How long have you been living here?', ph: 'vee LANG-eh vohnst doo shon heer', use: 'Natural follow-up conversation when meeting someone new', lv: 'A2' },
      { id: 'gr12', t: 'greet', de: 'Hast du Kinder?', en: 'Do you have children?', ph: 'hast doo KIN-der', use: 'Common small talk - Germans ask this fairly early', lv: 'A1' },
      { id: 'sh1', t: 'shop', de: 'Was kostet das?', en: 'How much does this cost?', ph: 'vas KOS-tet das', use: 'Universal question - works in any shop', lv: 'A1' },
      { id: 'sh2', t: 'shop', de: 'Kann ich mit Karte zahlen?', en: 'Can I pay by card?', ph: 'kan ikh mit KAR-teh TSA-len', use: 'ESSENTIAL - many German shops still prefer cash. Always ask first!', lv: 'A1' },
      { id: 'sh3', t: 'shop', de: 'Wo finde ich die Milch?', en: 'Where can I find the milk?', ph: 'vo FIN-deh ikh dee milkh', use: 'In supermarket - swap "die Milch" for any item', lv: 'A1' },
      { id: 'sh4', t: 'shop', de: 'Ich schaue mich nur um.', en: "I'm just browsing, thanks.", ph: 'ikh SHOW-eh mikh noor oom', use: 'When a shop assistant approaches - saves awkward silence', lv: 'A2' },
      { id: 'sh5', t: 'shop', de: 'Haben Sie das in einer anderen Größe?', en: 'Do you have this in a different size?', ph: 'HA-ben zee das in EYE-ner AN-de-ren GRUH-seh', use: 'In clothing stores', lv: 'A2' },
      { id: 'sh6', t: 'shop', de: 'Das nehme ich.', en: "I'll take this one.", ph: 'das NAY-meh ikh', use: 'Confirming a purchase - short and natural', lv: 'A1' },
      { id: 'sh7', t: 'shop', de: 'Haben Sie eine Tüte?', en: 'Do you have a bag?', ph: 'HA-ben zee EYE-neh TUE-teh', use: 'At checkout - "Tüte" is the everyday word for a plastic or paper carrier bag', lv: 'A1' },
      { id: 'sh8', t: 'shop', de: 'Das ist mir etwas zu teuer.', en: "That's a bit too expensive for me.", ph: 'das ist meer ET-vas tsoo TOY-er', use: 'Polite way to decline a price without being rude', lv: 'A2' },
      { id: 'sh9', t: 'shop', de: 'Haben Sie etwas Günstigeres?', en: 'Do you have something cheaper?', ph: 'HA-ben zee ET-vas GÜN-sti-ge-res', use: 'Asking for a cheaper alternative - perfectly normal', lv: 'A2' },
      { id: 'sh10', t: 'shop', de: 'Wo ist die Kasse?', en: 'Where is the checkout / cashier?', ph: 'vo ist dee KAS-seh', use: 'In supermarkets and department stores', lv: 'A1' },
      { id: 'sh11', t: 'shop', de: 'Ich möchte das zurückgeben.', en: "I'd like to return this.", ph: 'ikh MURKH-teh das tsoo-RÜCK-gey-ben', use: 'At customer service - bring your receipt (Kassenbon)!', lv: 'A2' },
      { id: 'sh12', t: 'shop', de: 'Kann ich einen Kassenbon haben?', en: 'Can I have a receipt?', ph: 'kan ikh EYE-nen KAS-en-bon HA-ben', use: 'Always ask - you need it for returns!', lv: 'A1' },
      { id: 'sh13', t: 'shop', de: 'Ist das reduziert?', en: 'Is this reduced / on sale?', ph: 'ist das reh-doo-ZEERT', use: 'During sales season or when checking discount racks', lv: 'A2' },
      { id: 'sh14', t: 'shop', de: 'Wann öffnet das Geschäft?', en: 'When does the shop open?', ph: 'van UHF-net das geh-SHEFT', use: 'Shops in Germany close early - always check! Also: schließt (closes)', lv: 'A1' },
      { id: 'tr1', t: 'transport', de: 'Einmal nach Stuttgart, bitte.', en: 'One ticket to Stuttgart, please.', ph: 'EYN-mal nakh SHTOOT-gart BI-teh', use: 'At ticket counter - swap city name as needed', lv: 'A1' },
      { id: 'tr2', t: 'transport', de: 'Ist dieser Platz noch frei?', en: 'Is this seat still free?', ph: 'ist DEE-zer plats nokh fry', use: 'On trains and buses - essential!', lv: 'A1' },
      { id: 'tr3', t: 'transport', de: 'Wann kommt der nächste Zug?', en: 'When does the next train come?', ph: 'van komt dair NAEKH-ste tsoog', use: 'At station or checking DB Navigator app', lv: 'A1' },
      { id: 'tr4', t: 'transport', de: 'Wo muss ich umsteigen?', en: 'Where do I need to change?', ph: 'vo moos ikh OOM-shty-gen', use: 'Asking about connections - very practical!', lv: 'A2' },
      { id: 'tr5', t: 'transport', de: 'Der Zug hat Verspätung.', en: 'The train is delayed.', ph: 'dair tsoog hat fer-SHPAY-toong', use: "You'll hear this often at German stations. Know it!", lv: 'A2' },
      { id: 'tr6', t: 'transport', de: 'Fährt dieser Bus zum Hauptbahnhof?', en: 'Does this bus go to the main station?', ph: 'fehrt DEE-zer boos tsum HOWPT-ban-hof', use: 'At bus stops - swap destination as needed', lv: 'A2' },
      { id: 'tr7', t: 'transport', de: 'Wie lange dauert die Fahrt?', en: 'How long does the journey take?', ph: 'vee LANG-eh DOW-ert dee fart', use: 'Before getting on a bus or train', lv: 'A2' },
      { id: 'tr8', t: 'transport', de: 'Gibt es eine Tageskarte?', en: 'Is there a day ticket?', ph: 'gipt es EYE-neh TA-ges-kar-teh', use: 'Great value for multiple trips in one day', lv: 'A2' },
      { id: 'tr9', t: 'transport', de: 'Auf welchem Gleis fährt der Zug ab?', en: 'Which track does the train leave from?', ph: 'owf VEL-khem GLYS fayrt der TSOOG ap', use: 'Germans say Gleis (track number), not Bahnsteig - check departure boards or ask station staff', lv: 'A2' },
      { id: 'tr10', t: 'transport', de: 'Wo kann ich ein Fahrrad mieten?', en: 'Where can I rent a bicycle?', ph: 'vo kan ikh eyn FAR-rad MEE-ten', use: 'Germany has great bike paths - Deutsche Bahn has nextbike too', lv: 'A2' },
      { id: 'tr11', t: 'transport', de: 'Ist das die richtige Richtung nach...?', en: 'Is this the right direction to...?', ph: 'ist das dee RIKH-ti-geh RIKH-toong nakh', use: "When unsure you're heading right - ask anyone nearby", lv: 'A2' },
      { id: 'tr12', t: 'transport', de: 'Können Sie mir ein Taxi bestellen?', en: 'Could you order a taxi for me?', ph: 'KÖN-nen zee meer eyn TAK-si beh-SHTEL-en', use: 'Polite way to ask staff to arrange a taxi — "bestellen" (order) is more natural here than "rufen"', lv: 'A1' },
      { id: 'tr13', t: 'transport', de: 'Ich habe das falsche Ticket gekauft.', en: 'I bought the wrong ticket.', ph: 'ikh HA-beh das FAL-sheh TI-ket geh-KOWFT', use: 'At the ticket counter or with a conductor - be honest!', lv: 'A2' },
      { id: 'tr14', t: 'transport', de: 'Bitte einmal hin und zurück.', en: 'One return ticket, please.', ph: 'BI-teh EYN-mal hin oond tsoo-RÜCK', use: '"Hin und zurück" = there and back = return ticket', lv: 'A1' },
      { id: 'fd1', t: 'food', de: 'Ich hätte gern einen Kaffee, bitte.', en: "I'd like a coffee, please.", ph: 'ikh HET-eh gern EYE-nen KAF-eh BI-teh', use: '"Ich hätte gern" = the most polite, natural ordering phrase', lv: 'A1' },
      { id: 'fd2', t: 'food', de: 'Die Speisekarte, bitte.', en: 'The menu, please.', ph: 'dee SHPY-zeh-kar-teh BI-teh', use: 'When seated at a restaurant - short and clear', lv: 'A1' },
      { id: 'fd3', t: 'food', de: 'Einmal das Schnitzel, bitte.', en: 'One Schnitzel please.', ph: 'EYN-mal das SHNIT-sel BI-teh', use: '"Einmal..." is how Germans order - use with anything on the menu', lv: 'A1' },
      { id: 'fd4', t: 'food', de: 'Zahlen, bitte!', en: 'The bill, please!', ph: 'TSA-len BI-teh', use: 'Say this to the waiter when you want to pay - universally understood', lv: 'A1' },
      { id: 'fd5', t: 'food', de: 'Stimmt so.', en: 'Keep the change.', ph: 'shtimt zo', use: 'Used when paying cash and rounding up — say it while handing over the money so the server knows not to bring change', lv: 'A2' },
      { id: 'fd6', t: 'food', de: 'Zusammen oder getrennt?', en: 'Together or separate bills?', ph: 'tsoo-ZA-men OH-der geh-TRENT', use: 'The waiter will ask YOU this. "Zusammen" = all together', lv: 'A2' },
      { id: 'fd7', t: 'food', de: 'Das hat super geschmeckt!', en: 'That tasted amazing!', ph: 'das hat ZOO-per geh-SHMEKT', use: 'A warm compliment for the cook or server — a genuine and natural thing to say after a meal', lv: 'A2' },
      { id: 'fd8', t: 'food', de: 'Was empfehlen Sie?', en: 'What do you recommend?', ph: 'vas em-PFAY-len zee', use: 'Great way to start a conversation with the waiter', lv: 'A2' },
      { id: 'fd9', t: 'food', de: 'Haben Sie vegetarische Gerichte?', en: 'Do you have vegetarian dishes?', ph: 'HA-ben zee ve-geh-TAR-ish-eh geh-RIKH-teh', use: 'Very common question - also: vegan, glutenfrei, laktosefrei', lv: 'A2' },
      { id: 'fd10', t: 'food', de: 'Ich bin allergisch gegen Nüsse.', en: "I'm allergic to nuts.", ph: 'ikh bin ah-LER-gish GAY-gen NÜ-seh', use: 'Important safety phrase - swap "Nüsse" with: Gluten, Milch, Eier', lv: 'A2' },
      { id: 'fd11', t: 'food', de: 'Einen Tisch für zwei Personen, bitte.', en: 'A table for two people, please.', ph: 'EYE-nen tish fuer tsvy per-ZO-nen BI-teh', use: 'When entering a restaurant without reservation', lv: 'A1' },
      { id: 'fd12', t: 'food', de: 'Ist der Tisch noch frei?', en: 'Is this table free?', ph: 'ist dair tish nokh fry', use: 'At cafés or busy restaurants - short and direct', lv: 'A1' },
      { id: 'fd13', t: 'food', de: 'Noch ein Wasser, bitte.', en: 'Another water, please.', ph: 'nokh eyn VAS-er BI-teh', use: 'Ordering another round - works for anything: Bier, Kaffee', lv: 'A1' },
      { id: 'fd14', t: 'food', de: 'Das ist nicht das, was ich bestellt habe.', en: "This isn't what I ordered.", ph: 'das ist nikht das, vas ikh beh-SHTELT HA-beh', use: 'When the wrong dish arrives - say this calmly', lv: 'A2' },
      { id: 'fd15', t: 'food', de: 'Können Sie das einpacken?', en: 'Could you pack this to go?', ph: 'KUH-nen zee das EYN-pak-ken', use: 'Doggy bag / takeaway - more accepted now than before', lv: 'A2' },
      { id: 'fd16', t: 'food', de: 'Ist das Trinkgeld inklusive?', en: 'Is the tip included?', ph: 'ist das TRINK-gelt in-kloo-ZEE-veh', use: 'A practical question at restaurants — in Germany, service is usually built into the price, but rounding up or adding ~10% is appreciated', lv: 'B1' },
      { id: 'hl1', t: 'health', de: 'Mir ist nicht gut.', en: "I'm not feeling well.", ph: 'meer ist nikht goot', use: 'Natural way to say you feel sick - "Ich bin krank" also works', lv: 'A1' },
      { id: 'hl2', t: 'health', de: 'Ich habe Kopfschmerzen.', en: 'I have a headache.', ph: 'ikh HA-beh KOPF-shmer-tsen', use: 'Replace "Kopf" with: Bauch (stomach), Hals (throat), Rücken (back)', lv: 'A1' },
      { id: 'hl3', t: 'health', de: 'Haben Sie noch einen freien Termin?', en: 'Do you have a free appointment?', ph: 'HA-ben zee nokh EYE-nen FRY-en ter-MEEN', use: 'Calling a doctor\'s office - add "diese Woche" (this week) if urgent', lv: 'A2' },
      { id: 'hl4', t: 'health', de: 'Ich bin gesetzlich versichert.', en: 'I have public health insurance.', ph: 'ikh bin geh-ZETS-likh fer-ZI-khert', use: 'Usually the first thing a receptionist asks — also: "privat versichert" for private insurance', lv: 'A2' },
      { id: 'hl5', t: 'health', de: 'Wo tut es weh?', en: 'Where does it hurt?', ph: 'vo toot es veh', use: 'Doctor asks you this - answer: "Hier tut es weh" (It hurts here)', lv: 'A1' },
      { id: 'hl6', t: 'health', de: 'Ich habe Fieber.', en: 'I have a fever.', ph: 'ikh HA-beh FEE-ber', use: 'Normal: 37°C | Fever: 38°C+ | High fever: 39°C+', lv: 'A1' },
      { id: 'hl7', t: 'health', de: 'Können Sie mir etwas verschreiben?', en: 'Can you prescribe me something?', ph: 'KUH-nen zee meer ET-vas fer-SHRY-ben', use: "Asking for a prescription at the doctor's", lv: 'B1' },
      { id: 'hl8', t: 'health', de: 'Wie oft soll ich das nehmen?', en: 'How often should I take this?', ph: 'vee oft zol ikh das NAY-men', use: 'At pharmacy or after getting a prescription', lv: 'A2' },
      { id: 'hl9', t: 'health', de: 'Ich brauche eine Krankschreibung.', en: 'I need a sick note for work.', ph: 'ikh BROW-kheh EY-neh KRANK-shry-boong', use: 'The word HR and doctors use for work sick leave — Attest is for school or clubs, not employment', lv: 'A2' },
      { id: 'hl10', t: 'health', de: 'Ich nehme täglich Medikamente.', en: 'I take medication daily.', ph: 'ikh NAY-meh TAYK-likh me-di-ka-MEN-teh', use: 'Important to tell any doctor - add the medicine name after', lv: 'A2' },
      { id: 'hl11', t: 'health', de: 'Ich habe mich verletzt.', en: 'I hurt / injured myself.', ph: 'ikh HA-beh mikh fer-LETST', use: 'For minor injuries - for emergencies say "Es ist ein Notfall"', lv: 'A2' },
      { id: 'hl12', t: 'health', de: 'Ich habe eine Lebensmittelallergie.', en: 'I have a food allergy.', ph: 'ikh HA-beh EYE-neh LAY-bens-mit-el-ah-LER-gee', use: 'At any food situation - follow with: "gegen..." (against...)', lv: 'A2' },
      { id: 'hl13', t: 'health', de: 'Ich brauche dringend einen Termin.', en: 'I urgently need an appointment.', ph: 'ikh BROW-kheh DRING-end EYE-nen ter-MEEN', use: '"Dringend" (urgently) helps you get a faster slot', lv: 'A2' },
      { id: 'hl14', t: 'health', de: 'Seit drei Tagen habe ich Schmerzen.', en: "I've had pain for three days.", ph: 'zeyt dry TA-gen HA-beh ikh SHMER-tsen', use: '"Seit" + time = how long you\'ve had the symptom', lv: 'A2' },
      { id: 'wk1', t: 'work', de: 'Ich bin heute im Homeoffice.', en: "I'm working from home today.", ph: 'ikh bin HOY-teh im HOME-of-ees', use: '"Homeoffice" is a German word now - used daily by millions', lv: 'A2' },
      { id: 'wk2', t: 'work', de: 'Ich bin krank und komme heute nicht.', en: "I'm sick and won't come in today.", ph: 'ikh bin krank oond KO-meh HOY-teh nikht', use: 'Call your boss first thing in the morning - brief and direct', lv: 'A2' },
      { id: 'wk3', t: 'work', de: 'Wann ist Feierabend?', en: 'When does the work day end?', ph: 'van ist FY-er-ah-bent', use: 'Classic German phrase - Feierabend is the sacred end of the workday!', lv: 'A2' },
      { id: 'wk4', t: 'work', de: 'Ich habe eine Frage dazu.', en: 'I have a question about that.', ph: 'ikh HA-beh EYE-neh FRA-geh da-TSOO', use: '"dazu" (about that) makes it clear what you\'re asking about', lv: 'A2' },
      { id: 'wk5', t: 'work', de: 'Das geht leider nicht.', en: "Unfortunately that won't work.", ph: 'das gayt LY-der nikht', use: 'Polite way to say no - "leider" softens it significantly', lv: 'A2' },
      { id: 'wk6', t: 'work', de: 'Können wir das verschieben?', en: 'Can we postpone this?', ph: 'KUH-nen veer das fer-SHEE-ben', use: 'Rescheduling a meeting or task', lv: 'A2' },
      { id: 'wk7', t: 'work', de: 'Ich bin in einem Meeting.', en: "I'm in a meeting.", ph: 'ikh bin in EYE-nem MEE-ting', use: 'Explaining why you can\'t talk - "Meeting" is used in German too', lv: 'A1' },
      { id: 'wk8', t: 'work', de: 'Kannst du mir das kurz erklären?', en: 'Can you briefly explain that to me?', ph: 'kanst doo meer das koorz er-KLAY-ren', use: '"Kurz" (briefly) makes the request sound less demanding', lv: 'A2' },
      { id: 'wk9', t: 'work', de: 'Ich schicke dir gleich eine E-Mail.', en: "I'll send you an email shortly.", ph: 'ikh SHI-keh deer glykh EYE-neh EE-mayl', use: 'After a conversation - "gleich" means in a moment', lv: 'A2' },
      { id: 'wk10', t: 'work', de: 'Das müssen wir noch besprechen.', en: 'We still need to discuss that.', ph: 'das MÜ-sen veer nokh beh-SHPRE-khen', use: 'After a meeting - flagging an open topic', lv: 'B1' },
      { id: 'wk11', t: 'work', de: 'Ich bin in fünf Minuten da.', en: "I'll be there in five minutes.", ph: 'ikh bin in fünf mi-NOO-ten da', use: 'Running late - quick and common', lv: 'A2' },
      { id: 'wk12', t: 'work', de: 'Melde dich, wenn du Fragen hast.', en: 'Let me know if you have questions.', ph: 'MEL-deh dikh, ven doo FRA-gen hast', use: 'Friendly sign-off after explaining something to a colleague', lv: 'B1' },
      { id: 'ho1', t: 'housing', de: 'Guten Morgen, ich bin Ihr neuer Nachbar.', en: "Good morning, I'm your new neighbor.", ph: 'GOO-ten MOR-gen, ikh bin eer NOY-er NAKH-bar', use: 'Introducing yourself in your building - Germans appreciate this!', lv: 'A1' },
      { id: 'ho2', t: 'housing', de: 'Ich möchte mich anmelden.', en: "I'd like to register my address.", ph: 'ikh MURKH-teh mikh AN-mel-den', use: 'CRITICAL - You MUST do Anmeldung within 2 weeks of moving!', lv: 'A2' },
      { id: 'ho3', t: 'housing', de: 'Die Heizung funktioniert nicht.', en: "The heating isn't working.", ph: 'dee HY-tsoong foong-tsyo-NEERT nikht', use: 'Reporting issues to landlord - swap: Aufzug (lift), Waschmaschine', lv: 'A2' },
      { id: 'ho4', t: 'housing', de: 'Wann wird der Müll abgeholt?', en: 'When is the rubbish collected?', ph: 'van vird dair müll AP-geh-holt', use: 'Recycling (Mülltrennung) is VERY serious in Germany!', lv: 'A2' },
      { id: 'ho5', t: 'housing', de: 'Wie hoch ist die Warmmiete?', en: 'What is the total rent including heating?', ph: 'vee hokh ist dee VARM-mee-teh', use: "Always ask Warmmiete - Kaltmiete doesn't include heating costs!", lv: 'A2' },
      { id: 'ho6', t: 'housing', de: 'Entschuldigung, können Sie etwas leiser sein?', en: 'Excuse me, could you be a bit quieter?', ph: 'ent-SHOOL-di-goong, KUH-nen zee ET-vas LY-zer zyne', use: 'Polite noise complaint - Ruhestunde: 1–3pm & 10pm–7am!', lv: 'A2' },
      { id: 'ho7', t: 'housing', de: 'Wo ist der Sicherungskasten?', en: 'Where is the fuse box?', ph: 'vo ist dair ZI-kher-oongs-kas-ten', use: 'Useful when power goes out in your flat', lv: 'A2' },
      { id: 'ho8', t: 'housing', de: 'Ich möchte kündigen.', en: 'I want to give notice (terminate my contract).', ph: 'ikh MURKH-teh KÜN-di-gen', use: 'Notice period in Germany: usually 3 months - check your Mietvertrag!', lv: 'B1' },
      { id: 'ho9', t: 'housing', de: 'Der Aufzug ist kaputt.', en: 'The lift is broken.', ph: 'dair OWF-tsoog ist ka-POOT', use: 'Report to Hausmeister (building manager) - very useful word: kaputt', lv: 'A2' },
      { id: 'ho10', t: 'housing', de: 'Ich hätte gerne meine Kaution zurück.', en: "I'd like my deposit back.", ph: 'ikh HET-eh GER-neh my-neh kow-TSYON tsoo-RÜCK', use: 'When moving out - Kaution = rental deposit, usually 3 months rent', lv: 'B1' },
      { id: 'ho11', t: 'housing', de: 'Darf ich ein Haustier halten?', en: 'Am I allowed to keep a pet?', ph: 'darf ikh eyn HOWS-teer HAL-ten', use: 'Always ask before getting a pet - some landlords forbid it', lv: 'A2' },
      { id: 'ho12', t: 'housing', de: 'Können Sie bitte den Hausmeister schicken?', en: 'Could you please send the building manager?', ph: 'KUH-nen zee BI-teh den HOWS-mys-ter SHI-ken', use: 'Hausmeister = handyman/building manager - very useful contact', lv: 'A2' },
      { id: 'ad1', t: 'admin', de: 'Ich möchte ein Konto eröffnen.', en: "I'd like to open a bank account.", ph: 'ikh MURKH-teh eyn KON-to er-UHF-nen', use: 'At the bank - bring: Ausweis, Anmeldebescheinigung, job contract', lv: 'A2' },
      { id: 'ad2', t: 'admin', de: 'Welche Unterlagen brauche ich?', en: 'Which documents do I need?', ph: 'VEL-kheh OON-ter-la-gen BROW-kheh ikh', use: 'Ask this BEFORE any official appointment - saves wasted trips!', lv: 'A2' },
      { id: 'ad3', t: 'admin', de: 'Ich brauche eine Bescheinigung.', en: 'I need an official confirmation letter.', ph: 'ikh BROW-kheh EYE-neh be-SHEY-ni-goong', use: 'At government offices - Bescheinigung = official confirmation', lv: 'B1' },
      { id: 'ad4', t: 'admin', de: 'Wann kann ich mit dem Bescheid rechnen?', en: 'When can I expect the decision/letter?', ph: 'van kan ikh mit dem be-SHEYT REKH-nen', use: 'After submitting forms - German bureaucracy takes time. Ask this!', lv: 'B1' },
      { id: 'ad5', t: 'admin', de: 'Ich möchte Geld überweisen.', en: "I'd like to transfer money.", ph: 'ikh MURKH-teh gelt Ü-ber-vy-zen', use: 'At the bank or online banking - Überweisen = bank transfer', lv: 'A2' },
      { id: 'ad6', t: 'admin', de: 'Ich habe meine Karte verloren.', en: "I've lost my card.", ph: 'ikh HA-beh my-neh KAR-teh fer-LO-ren', use: 'Call your bank immediately - have your IBAN ready', lv: 'A2' },
      { id: 'ad7', t: 'admin', de: 'Können Sie das auf Englisch erklären?', en: 'Can you explain that in English?', ph: 'KUH-nen zee das owf ENG-lish er-KLAY-ren', use: 'Emergency option at official offices - most staff speak some English', lv: 'A2' },
      { id: 'ad8', t: 'admin', de: 'Ich muss einen Termin online buchen.', en: 'I need to book an appointment online.', ph: 'ikh moos EYE-nen ter-MEEN on-LINE BOO-khen', use: 'Most Ämter (offices) require online booking - google "[Amt] Termin"', lv: 'A2' },
      { id: 'ad9', t: 'admin', de: 'Was ist die IBAN für dieses Konto?', en: 'What is the IBAN for this account?', ph: 'vas ist dee EE-ban fuer DEE-zes KON-to', use: 'IBAN is used for all German bank transfers - no sort codes', lv: 'A2' },
      { id: 'ad10', t: 'admin', de: 'Ich zahle per Lastschrift.', en: 'I pay by direct debit.', ph: 'ikh TSA-leh pair LAST-shrift', use: 'Very common in Germany - authorizing automatic monthly payments', lv: 'B1' },
      { id: 'ad11', t: 'admin', de: 'Ich bin nicht einverstanden.', en: "I don't agree / I object to this.", ph: 'ikh bin nikht eyn-fer-SHTAN-den', use: 'Formal objection at official offices - polite but firm', lv: 'B1' },
      { id: 'ad12', t: 'admin', de: 'Wann ist die Abgabefrist?', en: 'What is the submission deadline?', ph: 'van ist dee ap-GA-beh-frist', use: 'For tax forms (Steuererklärung) and other official submissions', lv: 'B1' },
      { id: 'sc1', t: 'social', de: 'Hast du Lust, heute Abend auszugehen?', en: 'Do you feel like going out tonight?', ph: 'hast doo loost HOY-teh AH-bent OWS-tsoo-gay-en', use: '"Lust haben" = feel like doing something. Very casual invite!', lv: 'A2' },
      { id: 'sc2', t: 'social', de: 'Ich bin leider schon verplant.', en: "I'm afraid I'm already busy.", ph: 'ikh bin LY-der shon fer-PLANT', use: 'Polite way to decline - "leider" keeps it friendly', lv: 'A2' },
      { id: 'sc3', t: 'social', de: 'Prost!', en: 'Cheers!', ph: 'prohst', use: 'Absolutely essential at any gathering. Make eye contact!', lv: 'A1' },
      { id: 'sc4', t: 'social', de: 'Das klingt gut!', en: 'That sounds good!', ph: 'das klingt goot', use: 'Agreeing to a plan - short and enthusiastic', lv: 'A1' },
      { id: 'sc5', t: 'social', de: 'Ich lade dich ein!', en: "It's on me! / My treat!", ph: 'ikh LA-deh dikh eyn', use: 'Offering to pay - a generous and appreciated phrase!', lv: 'A2' },
      { id: 'sc6', t: 'social', de: 'Wollen wir getrennt zahlen?', en: 'Shall we pay separately?', ph: 'VO-len veer geh-TRENT TSA-len', use: 'Natural and broadly understood way to suggest splitting the bill at a restaurant or café', lv: 'A2' },
      { id: 'sc7', t: 'social', de: 'Ich freue mich schon darauf!', en: "I'm already looking forward to it!", ph: 'ikh FROY-eh mikh shon da-ROWF', use: 'Showing genuine excitement - sounds very natural and warm', lv: 'A2' },
      { id: 'sc8', t: 'social', de: 'Wann fängt es an?', en: 'When does it start?', ph: 'van fengt es an', use: 'For any event, party, film - very versatile', lv: 'A1' },
      { id: 'sc9', t: 'social', de: "Wie war's?", en: 'How was it?', ph: 'vee vars', use: 'After someone comes back from an event - very casual short form', lv: 'A1' },
      { id: 'sc10', t: 'social', de: 'Das war mega lustig!', en: 'That was really funny / so fun!', ph: 'das var MAY-ga LOO-stikh', use: '"Mega" is very common in German casual speech - like "so" in English', lv: 'A1' },
      { id: 'sc11', t: 'social', de: 'Ich kenne da ein gutes Restaurant.', en: 'I know a good restaurant there.', ph: 'ikh KEN-eh da eyn GOO-tes res-taw-RANT', use: 'Suggesting a place - "da" means "there" in that area', lv: 'A2' },
      { id: 'sc12', t: 'social', de: 'Bist du schon mal in München gewesen?', en: 'Have you ever been to Munich?', ph: 'bist doo shon mal in MÜN-khen geh-VEY-zen', use: '"Schon mal" = ever/before. Great conversation starter!', lv: 'A2' },
      { id: 'em1', t: 'emergency', de: 'Hilfe!', en: 'Help!', ph: 'HIL-feh', use: "Shout clearly and loudly - don't hesitate", lv: 'A1' },
      { id: 'em2', t: 'emergency', de: 'Rufen Sie bitte die Polizei!', en: 'Please call the police!', ph: 'ROO-fen zee BI-teh dee po-li-TSEY', use: 'Police: 110 | Fire & Ambulance: 112', lv: 'A1' },
      { id: 'em3', t: 'emergency', de: 'Ich brauche einen Krankenwagen.', en: 'I need an ambulance.', ph: 'ikh BROW-kheh EYE-nen KRAN-ken-va-gen', use: 'Emergency: 112 - works all over EU!', lv: 'A1' },
      { id: 'em4', t: 'emergency', de: 'Es hat einen Unfall gegeben.', en: 'There has been an accident.', ph: 'es hat EYE-nen OON-fall geh-GAY-ben', use: 'Reporting an accident to emergency services', lv: 'A2' },
      { id: 'em5', t: 'emergency', de: 'Ich habe meinen Ausweis verloren.', en: "I've lost my ID card.", ph: 'ikh HA-beh my-nen OWS-vys fer-LO-ren', use: 'Report to nearest police station (Polizeiwache) immediately', lv: 'A2' },
      { id: 'em6', t: 'emergency', de: 'Mein Handy wurde gestohlen.', en: 'My phone was stolen.', ph: 'myne HAN-dee VOOR-deh geh-SHTO-len', use: 'File a report (Anzeige) at the police station - needed for insurance', lv: 'A2' },
      { id: 'em7', t: 'emergency', de: 'Ich fühle mich unwohl.', en: 'I feel unwell / faint.', ph: 'ikh FÜ-leh mikh OON-vohl', use: "When you need help urgently but it's not immediately life-threatening", lv: 'A2' },
      { id: 'em8', t: 'emergency', de: 'Wo ist das nächste Krankenhaus?', en: 'Where is the nearest hospital?', ph: 'vo ist das NAEKH-ste KRAN-ken-hows', use: 'For serious injuries - for minor things go to Arztpraxis first', lv: 'A1' },
      { id: 'em9', t: 'emergency', de: 'Ich habe meine Tasche irgendwo liegen lassen.', en: 'I left my bag somewhere.', ph: 'ikh HA-beh my-neh TASH-eh EER-gent-vo LEE-gen LAS-en', use: 'Lost property - try Fundbüro (lost and found) at station', lv: 'B1' },
      { id: 'em10', t: 'emergency', de: 'Bitte rufen Sie sofort einen Arzt.', en: 'Please call a doctor immediately.', ph: 'BI-teh ROO-fen zee zo-FORT EYE-nen artst', use: '"Sofort" = immediately/right away - signals urgency', lv: 'A2' },
      { id: 'ph1', t: 'phone', de: 'Können Sie bitte Ihren Namen buchstabieren?', en: 'Could you please spell your name?', ph: 'KUH-nen zee BI-teh EE-ren NA-men BOOKH-shta-bee-ren', use: 'On the phone or filling in forms - very important in Germany!', lv: 'A2' },
      { id: 'ph2', t: 'phone', de: 'Ich rufe wegen eines Termins an.', en: "I'm calling about an appointment.", ph: 'ikh ROO-feh VAY-gen EYE-nes ter-MEENS an', use: 'Opening line when calling a doctor/office', lv: 'A2' },
      { id: 'ph3', t: 'phone', de: 'Ich rufe später zurück.', en: "I'll call back later.", ph: 'ikh ROO-feh SHPAY-ter tsoo-RÜCK', use: "When you reach voicemail or it's a bad time", lv: 'A2' },
      { id: 'ph4', t: 'phone', de: 'Wie ist das WLAN-Passwort?', en: 'What is the WiFi password?', ph: 'vee ist das VAY-lan PAS-vort', use: 'Essential question in every café, hotel, and new home!', lv: 'A1' },
      { id: 'ph5', t: 'phone', de: 'Ich habe keine Verbindung.', en: 'I have no connection.', ph: 'ikh HA-beh KY-neh fer-BIN-doong', use: 'No signal, no WiFi, or no internet - very universal', lv: 'A2' },
      { id: 'ph6', t: 'phone', de: 'Kannst du mir deine Nummer geben?', en: 'Can you give me your number?', ph: 'kanst doo meer DY-neh NOO-mer GAY-ben', use: "Casual everyday ask — use with friends and new acquaintances. Formal: 'Können Sie mir Ihre Nummer geben?'", lv: 'A2' },
      { id: 'ph7', t: 'phone', de: 'Das Handy hat keinen Akku mehr.', en: 'The phone has no battery left.', ph: 'das HAN-dee hat KY-nen AK-oo mehr', use: '"Akku" = battery - very common complaint!', lv: 'A2' },
      { id: 'ph8', t: 'phone', de: 'Darf ich hier kurz aufladen?', en: 'May I charge my phone briefly here?', ph: 'darf ikh heer koorz OWF-la-den', use: 'At a café, shop, or office - "kurz" makes it sound polite', lv: 'A2' },
      { id: 'ph9', t: 'phone', de: 'Kannst du das nochmal schicken?', en: 'Can you send that again?', ph: 'kanst doo das NOKH-mal SHI-ken', use: "Typical WhatsApp/chat message when something wasn't received. Formal: 'Können Sie das noch mal schicken?'", lv: 'A2' },
      { id: 'ph10', t: 'phone', de: 'Ich bin gerade schlecht erreichbar.', en: "I'm currently hard to reach.", ph: 'ikh bin geh-RA-deh shlekht er-REKH-bar', use: 'In your out-of-office or to explain unavailability', lv: 'B1' },
      { id: 'tm1', t: 'time', de: 'Wie spät ist es?', en: 'What time is it?', ph: 'vee shpeyt ist es', use: 'Asking the time - also "Wie viel Uhr ist es?"', lv: 'A1' },
      { id: 'tm2', t: 'time', de: 'Es ist halb drei.', en: 'It\'s half past two. (lit: "half three")', ph: 'es ist halb dry', use: 'CAREFUL: "halb drei" = 2:30, NOT 3:30! Germans count to the next hour', lv: 'A1' },
      { id: 'tm3', t: 'time', de: 'Wann haben Sie geöffnet?', en: 'When are you open?', ph: 'van HA-ben zee geh-UHF-net', use: 'Calling a shop or office - also "Bis wann?" (Until when?)', lv: 'A1' },
      { id: 'tm4', t: 'time', de: 'Das kostet fünfzehn Euro fünfzig.', en: 'That costs fifteen euros fifty.', ph: 'das KOS-tet FÜNF-tseyn OY-ro FÜNF-tsikh', use: 'Prices - practice numbers 1-100, they come up constantly', lv: 'A1' },
      { id: 'tm5', t: 'time', de: 'Ich brauche das bis Freitag.', en: 'I need this by Friday.', ph: 'ikh BROW-kheh das bis FRY-tahg', use: '"Bis" = by/until - great for deadlines', lv: 'A2' },
      { id: 'tm6', t: 'time', de: 'Können wir auf nächste Woche verschieben?', en: 'Can we move this to next week?', ph: 'KUH-nen veer owf NAEKH-ste VO-kheh fer-SHEE-ben', use: 'Rescheduling anything - very practical', lv: 'A2' },
      { id: 'tm7', t: 'time', de: 'Ich bin in zwanzig Minuten da.', en: "I'll be there in twenty minutes.", ph: 'ikh bin in TSVAN-tsikh mi-NOO-ten da', use: 'Running late - swap the number as needed', lv: 'A2' },
      { id: 'tm8', t: 'time', de: 'Der Termin ist am Donnerstag um zehn Uhr.', en: 'The appointment is on Thursday at ten.', ph: 'dair ter-MEEN ist am DON-ers-tahg oom tseyn oor', use: 'Confirming appointments - practice days and numbers!', lv: 'A1' },
      { id: 'tm9', t: 'time', de: 'Wie lange dauert das noch?', en: 'How much longer will this take?', ph: 'vee LANG-eh DOW-ert das nokh', use: 'Waiting in a queue, at the doctor, in traffic', lv: 'A2' },
      { id: 'tm10', t: 'time', de: 'Ich bin pünktlich.', en: 'I\'m on time / punctual.', ph: 'ikh bin PÜNKT-likh', use: 'Germans take punctuality very seriously - being on time is expected!', lv: 'A1' },
      { id: 'fe1', t: 'feelings', de: 'Ich finde das gut.', en: 'I think that\'s good / I like that.', ph: 'ikh FIN-deh das goot', use: '"Ich finde" is a great opinion starter - also: nicht so gut, okay', lv: 'A1' },
      { id: 'fe2', t: 'feelings', de: 'Das gefällt mir.', en: 'I like that. (lit: That pleases me)', ph: 'das geh-FELT meer', use: '"Das gefällt mir" is natural for things you see or experience; "Ich mag das" works too and is equally common', lv: 'A1' },
      { id: 'fe3', t: 'feelings', de: 'Das ist mir egal.', en: "I don't mind / I don't care.", ph: 'das ist meer EH-gal', use: 'Neutral response - NOT rude! Very common in everyday speech', lv: 'A1' },
      { id: 'fe4', t: 'feelings', de: 'Ich bin total müde.', en: "I'm completely exhausted.", ph: 'ikh bin to-TAL MÜ-deh', use: '"Total" is used like "completely/totally" in German casual speech', lv: 'A1' },
      { id: 'fe5', t: 'feelings', de: 'Das nervt mich.', en: 'That annoys/bothers me.', ph: 'das nerfft mikh', use: 'Common frustration expression - also: "Das stört mich"', lv: 'A2' },
      { id: 'fe6', t: 'feelings', de: 'Ich bin gespannt!', en: "I'm excited / curious about it!", ph: 'ikh bin geh-SHPANT', use: 'Like waiting for a result or looking forward to something', lv: 'A2' },
      { id: 'fe7', t: 'feelings', de: 'Das macht mir Spaß.', en: "I enjoy that / That's fun.", ph: 'das makht meer shpas', use: '"Spaß machen" = to be fun - Spaß = fun/joy', lv: 'A2' },
      { id: 'fe8', t: 'feelings', de: 'Ich sehe das anders.', en: 'I see it differently.', ph: 'ikh ZAY-eh das AN-ders', use: 'Polite way to disagree - much softer than "Das stimmt nicht!"', lv: 'B1' },
      { id: 'fe9', t: 'feelings', de: 'Das ist wirklich schade.', en: "That's really a shame / pity.", ph: 'das ist VIRK-likh SHA-deh', use: 'Expressing disappointment - "Schade!" alone also works', lv: 'A2' },
      { id: 'fe10', t: 'feelings', de: 'Das kenne ich gar nicht.', en: "I don't know that at all.", ph: 'das KEN-eh ikh gar nikht', use: '"Gar nicht" = not at all - intensifies the negation', lv: 'A2' },
      { id: 'fe11', t: 'feelings', de: 'Das wusste ich nicht.', en: "I didn't know that.", ph: 'das VOOS-teh ikh nikht', use: 'When you learn something new - simple and natural', lv: 'A2' },
      { id: 'fe12', t: 'feelings', de: 'Ich bin damit nicht einverstanden.', en: "I don't agree with that.", ph: 'ikh bin da-MIT nikht eyn-fer-SHTAN-den', use: 'Formal disagreement - more polite in formal situations than "Nein"', lv: 'B1' },
      { id: 'ro1', t: 'routine', de: 'Ich stehe um sieben Uhr auf.', en: 'I get up at seven o\'clock.', ph: 'ikh SHTAY-eh oom ZEE-ben oor OWF', use: 'Using "aufstehen" (to get up) - separable verb!', lv: 'A1' },
      { id: 'ro2', t: 'routine', de: 'Ich fahre mit der S-Bahn zur Arbeit.', en: 'I go to work by S-Bahn.', ph: 'ikh FA-reh mit dair ES-ban tsoor AR-byte', use: 'Swap transport: U-Bahn, Bus, Straßenbahn, Fahrrad, Auto', lv: 'A1' },
      { id: 'ro3', t: 'routine', de: 'Ich koche abends gerne.', en: 'I like cooking in the evenings.', ph: 'ikh KO-kheh AH-bents GER-neh', use: '"Gerne" after the verb = I like to do it - very natural', lv: 'A2' },
      { id: 'ro4', t: 'routine', de: 'Ich gehe um elf Uhr schlafen.', en: 'I go to sleep at eleven.', ph: 'ikh GAY-eh oom elf oor SHLA-fen', use: '"Schlafen gehen" = to go to sleep', lv: 'A1' },
      { id: 'ro5', t: 'routine', de: 'Am Wochenende gehe ich gerne raus.', en: 'At the weekend I like to go out.', ph: 'am VO-khen-en-deh GAY-eh ikh GER-neh rows', use: '"Rausgehen" = going outside - very common German phrase', lv: 'A2' },
      { id: 'ro6', t: 'routine', de: 'Ich lerne jeden Tag ein bisschen Deutsch.', en: 'I study a little German every day.', ph: 'ikh LER-neh YAY-den tahg eyn BIS-khen doytsh', use: 'Your daily habit! "Jeden Tag" = every day, "ein bisschen" = a little', lv: 'A1' },
      { id: 'ro7', t: 'routine', de: 'Ich treffe mich manchmal mit Freunden.', en: 'I sometimes meet up with friends.', ph: 'ikh TREF-eh mikh MANKH-mal mit FROY-nden', use: '"Sich treffen mit" = to meet with someone', lv: 'A2' },
      { id: 'ro8', t: 'routine', de: 'Was machst du in deiner Freizeit?', en: 'What do you do in your free time?', ph: 'vas makhst doo in DY-ner FRY-tseyt', use: 'Great conversation starter - "Freizeit" = free/leisure time', lv: 'A2' },
      { id: 'ro9', t: 'routine', de: 'Ich frühstücke meistens zu Hause.', en: 'I usually have breakfast at home.', ph: 'ikh FRÜH-shtü-keh MYS-tens tsoo HOW-zeh', use: '"Meistens" = usually/mostly - very useful frequency word', lv: 'A2' },
      { id: 'ro10', t: 'routine', de: 'Ich muss noch einkaufen gehen.', en: 'I still need to go shopping.', ph: 'ikh moos nokh EYN-kow-fen GAY-en', use: '"Noch" = still/yet - adds a sense of something left to do', lv: 'A2' },
      { id: 'wt1', t: 'weather', de: 'Heute ist es schön.', en: 'Today is nice weather.', ph: 'HOY-teh ist es shun', use: 'Most frequent small talk opener in Germany!', lv: 'A1' },
      { id: 'wt2', t: 'weather', de: 'Es regnet schon wieder!', en: "It's raining again!", ph: 'es REG-net shon VEE-der', use: '"Schon wieder" = yet again - Germany feels this deeply', lv: 'A1' },
      { id: 'wt3', t: 'weather', de: 'Es ist ganz schön kalt heute.', en: "It's quite cold today.", ph: 'es ist gants shun kalt HOY-teh', use: '"Ganz schön" = quite/pretty - adds emphasis without exaggerating', lv: 'A1' },
      { id: 'wt4', t: 'weather', de: 'Typisch deutsches Wetter!', en: 'Typical German weather!', ph: 'TÜ-pish DOYT-shes VET-er', use: 'Bonding phrase - Germans say this all the time, usually ironically', lv: 'A1' },
      { id: 'wt5', t: 'weather', de: 'Wird es morgen besser?', en: 'Will it be better tomorrow?', ph: 'vird es MOR-gen BES-er', use: 'Optimism! Check "Wetter.com" or "wetteronline.de"', lv: 'A2' },
      { id: 'wt6', t: 'weather', de: 'Ich mag den Sommer lieber.', en: 'I prefer the summer.', ph: 'ikh mahg den ZO-mer LEE-ber', use: '"Lieber" = prefer - e.g. "Ich trinke lieber Kaffee als Tee"', lv: 'A2' },
      { id: 'wt7', t: 'weather', de: 'Hast du was vor am Wochenende?', en: 'Do you have anything planned for the weekend?', ph: 'hast doo vas for am VO-khen-en-deh', use: 'Classic Friday small talk - "was vorhaben" = to have plans', lv: 'A2' },
      { id: 'wt8', t: 'weather', de: 'Wie war dein Urlaub?', en: 'How was your holiday?', ph: 'vee var dyne OOR-lowb', use: 'Great conversation starter when someone returns from vacation', lv: 'A1' },
      { id: 'wt9', t: 'weather', de: 'Ich war noch nie auf dem Weihnachtsmarkt.', en: "I've never been to a Christmas market.", ph: 'ikh var nokh nee owf dem VYE-nakhts-markt', use: '"Noch nie" = never before - Weihnachtsmarkt is a must in Germany!', lv: 'A2' },
      { id: 'wt10', t: 'weather', de: 'Hast du die Nachrichten gehört?', en: 'Did you hear the news?', ph: 'hast doo dee NAKH-rikh-ten geh-HURT', use: 'Starting a conversation about current events', lv: 'A2' },
      // ─── Reactions (things you say 50x per day) ─────────
      { id: 're1', t: 'react', de: 'Genau!', en: 'Exactly! / Right!', ph: 'geh-NOW', use: 'Very common in spoken German — used like "exactly" or "right" in English to show agreement or confirm what someone said', lv: 'A1' },
      { id: 're2', t: 'react', de: 'Stimmt!', en: "That's right! / True!", ph: 'shtimt', use: 'Confirming something someone said is correct', lv: 'A1' },
      { id: 're3', t: 'react', de: 'Klar!', en: 'Sure! / Of course!', ph: 'klahr', use: 'Quick agreement - "Kannst du kommen?" → "Klar!"', lv: 'A1' },
      { id: 're4', t: 'react', de: 'Auf jeden Fall!', en: 'Definitely! / For sure!', ph: 'owf YAY-den fal', use: 'Strong agreement - more enthusiastic than "Klar"', lv: 'A1' },
      { id: 're5', t: 'react', de: 'Kein Problem!', en: 'No problem!', ph: 'kyne pro-BLEM', use: 'When someone thanks you or asks for a small favor', lv: 'A1' },
      { id: 're6', t: 'react', de: 'Alles gut!', en: "All good! / It's fine!", ph: 'AL-es goot', use: 'Reassuring someone - also used as "don\'t worry about it"', lv: 'A1' },
      { id: 're7', t: 'react', de: 'Macht nichts!', en: 'Never mind! / No worries!', ph: 'makht nikhts', use: 'When someone apologizes for something small', lv: 'A1' },
      { id: 're8', t: 'react', de: 'Keine Ahnung.', en: 'No idea.', ph: 'KY-neh AH-noong', use: 'When you genuinely don\'t know - very common casual response', lv: 'A1' },
      { id: 're9', t: 'react', de: 'Mal sehen.', en: "Let's see. / We'll see.", ph: 'mal ZAY-en', use: 'Non-committal response - not yes, not no', lv: 'A1' },
      { id: 're10', t: 'react', de: 'Passt!', en: 'Works for me! / That fits!', ph: 'passt', use: 'Agreeing to a time, plan, or suggestion - very common', lv: 'A1' },
      { id: 're11', t: 'react', de: 'Gerne!', en: 'Sure! / My pleasure! / Gladly!', ph: 'GER-neh', use: 'Used by everyone - cashiers say it, friends say it, YOU should say it. Means "you\'re welcome" and "gladly"', lv: 'A1' },
      { id: 're12', t: 'react', de: 'Ach so!', en: 'Oh I see! / Ah, right!', ph: 'akh ZO', use: 'When you finally understand something - the lightbulb moment', lv: 'A1' },
      { id: 're13', t: 'react', de: 'Echt?', en: 'Really?', ph: 'ekht', use: 'Surprised reaction - "Ich ziehe um." → "Echt?"', lv: 'A1' },
      { id: 're14', t: 'react', de: 'Na ja...', en: 'Well... / I mean...', ph: 'na ya', use: 'Filler word when you\'re thinking or not fully agreeing. Germans say this constantly', lv: 'A1' },
      { id: 're15', t: 'react', de: 'Schon gut.', en: "It's alright. / Don't worry about it.", ph: 'shon goot', use: 'Accepting an apology or saying "forget it" - calm and casual', lv: 'A1' },
      { id: 're16', t: 'react', de: 'Das ist ja krass!', en: "That's crazy! / Wow!", ph: 'das ist ya kras', use: 'Expressing surprise or disbelief - very common among younger people', lv: 'A1' },
      { id: 're17', t: 'react', de: 'Unbedingt!', en: 'Absolutely! / For sure!', ph: 'oon-beh-DINGT', use: 'Strong enthusiastic yes - "Sollen wir Pizza bestellen?" → "Unbedingt!"', lv: 'A2' },
      { id: 're18', t: 'react', de: 'Vielleicht.', en: 'Maybe. / Perhaps.', ph: 'fee-LAYKHT', use: 'The everyday word for maybe — far more common in speech than "Kann sein"', lv: 'A1' },
      // ─── Understanding (survival at any level) ──────────
      { id: 'un1', t: 'understand', de: 'Wie bitte?', en: 'Sorry, what? / Pardon?', ph: 'vee BI-teh', use: 'Natural way to ask someone to repeat themselves — polite and works in any situation', lv: 'A1' },
      { id: 'un2', t: 'understand', de: 'Kannst du das nochmal sagen?', en: 'Can you say that again?', ph: 'kanst doo das NOKH-mal ZA-gen', use: "Everyday request among friends and colleagues. Formal version: 'Können Sie das nochmal sagen?'", lv: 'A1' },
      { id: 'un3', t: 'understand', de: 'Langsamer, bitte!', en: 'Slower, please!', ph: 'LANG-za-mer BI-teh', use: 'When someone is speaking too fast - don\'t be shy to say this!', lv: 'A1' },

      { id: 'p37', cat: 'ordering', template: 'Bitte [Verb] Sie [Nomen].', meaning: '"Please [verb] [noun]" - formal imperative request', examples: [{ de: 'Bitte rufen Sie mich zurück.', en: 'Please call me back.' }, { de: 'Bitte schicken Sie die Unterlagen.', en: 'Please send the documents.' }, { de: 'Bitte sprechen Sie langsamer.', en: 'Please speak more slowly.' }] },
      { id: 'p38', cat: 'location', template: 'Gibt es [Nomen] in der Nähe?', meaning: '"Is there [noun] nearby?" - finding things near you', examples: [{ de: 'Gibt es eine Apotheke in der Nähe?', en: 'Is there a pharmacy nearby?' }, { de: 'Gibt es einen Parkplatz in der Nähe?', en: 'Is there a car park nearby?' }, { de: 'Gibt es einen Geldautomaten hier?', en: 'Is there a cash machine here?' }] },
      { id: 'p39', cat: 'past', template: 'Ich habe noch nie [Verb Partizip].', meaning: '"I have never [done something]" - expressing lack of experience', examples: [{ de: 'Ich habe noch nie Sauerkraut gegessen.', en: "I've never eaten Sauerkraut." }, { de: 'Ich habe noch nie in Deutschland gearbeitet.', en: "I've never worked in Germany." }, { de: 'Ich habe noch nie Ski gefahren.', en: "I've never been skiing." }] },
      { id: 'p40', cat: 'future', template: 'Sobald [Satz], werde ich [Verb].', meaning: '"As soon as [sentence], I will [verb]" - conditional future', examples: [{ de: 'Sobald ich Zeit habe, rufe ich an.', en: "As soon as I have time, I'll call." }, { de: 'Sobald das fertig ist, schicke ich es.', en: "As soon as it's done, I'll send it." }, { de: 'Sobald ich weiß, sage ich Bescheid.', en: "As soon as I know, I'll let you know." }] },
    ];

    // ══════════════════════════════════════════════
    // STORAGE
    // ══════════════════════════════════════════════
    const SKEY = 'dd_v4';
    const SKEY_OLD = 'dd_clean_v1';
    let DB = { learned: new Set(), favorites: new Set(), understood: new Set(), streak: 0, lastStudy: null, dailyGoal: 10, dailyQueue: [], dailyQueueDate: null, dailyLearned: new Set(), history: {}, historyWords: {}, srs: {} };

    function dbToObj() {
      return {
        learned: [...DB.learned], favorites: [...DB.favorites], understood: [...DB.understood],
        streak: DB.streak, lastStudy: DB.lastStudy, dailyGoal: DB.dailyGoal,
        dailyQueue: DB.dailyQueue, dailyQueueDate: DB.dailyQueueDate,
        dailyLearned: [...DB.dailyLearned], history: DB.history, historyWords: DB.historyWords, srs: DB.srs
      };
    }
    function objToDB(p) {
      DB.learned = new Set(p.learned || []); DB.favorites = new Set(p.favorites || []); DB.understood = new Set(p.understood || []);
      DB.streak = p.streak || 0; DB.lastStudy = p.lastStudy || null; DB.dailyGoal = p.dailyGoal || 10;
      DB.dailyQueue = p.dailyQueue || []; DB.dailyQueueDate = p.dailyQueueDate || null;
      DB.dailyLearned = new Set(p.dailyLearned || []); DB.history = p.history || {};
      DB.historyWords = p.historyWords || {};
      DB.srs = p.srs || {};
    }

    async function load() {
      try {
        let raw = localStorage.getItem(SKEY);
        if (!raw) raw = localStorage.getItem(SKEY_OLD);
        if (raw) objToDB(JSON.parse(raw));
      } catch (e) { }

      let needsSave = false;

      // ── Migration: remove orphaned IDs not present in SENTENCES ─────────────
      // Protects against phantom counts if sentence IDs changed across versions
      // or a bad import added non-existent IDs.
      const validIds = new Set(SENTENCES.map(s => s.id));
      DB.learned.forEach(id => { if (!validIds.has(id)) { DB.learned.delete(id); needsSave = true; } });
      DB.favorites.forEach(id => { if (!validIds.has(id)) { DB.favorites.delete(id); needsSave = true; } });
      DB.dailyLearned.forEach(id => { if (!validIds.has(id)) { DB.dailyLearned.delete(id); needsSave = true; } });

      // ── Migration: remove SRS entries for cards that were never learned ──────
      // A prior bug called srsSchedule on unlearned cards when "Still learning"
      // was tapped, giving them a future nextReview date that hid them from the
      // daily queue forever. Purge any such entries now.
      Object.keys(DB.srs).forEach(id => {
        if (!DB.learned.has(id)) { delete DB.srs[id]; needsSave = true; }
      });

      // ── Migration: deduplicate historyWords (first-recorded date wins) ───────
      // The old backfill bug copied the previous day's learned words into the
      // current day's bucket on every new-day load. Fix by keeping each word ID
      // only in its chronologically earliest date bucket.
      const hwKeys = Object.keys(DB.historyWords).sort((a, b) => {
        const pa = a.split('-').map(Number), pb = b.split('-').map(Number);
        return new Date(pa[0], pa[1] - 1, pa[2]) - new Date(pb[0], pb[1] - 1, pb[2]);
      });
      const seenHWIds = new Set();
      hwKeys.forEach(key => {
        const before = DB.historyWords[key];
        const after = before.filter(id => !seenHWIds.has(id));
        after.forEach(id => seenHWIds.add(id));
        if (after.length !== before.length) { DB.historyWords[key] = after; needsSave = true; }
      });

      // ── Migration: sync DB.learned to historyWords as source of truth ────────
      // Any word in DB.learned that has no historyWords entry in any date is an
      // orphaned ghost entry (learned via a path that never wrote historyWords,
      // or corrupted by the old backfill bug). Remove them so all counts match.
      const allTrackedIds = new Set(Object.values(DB.historyWords).flat());
      DB.learned.forEach(id => {
        if (!allTrackedIds.has(id) && !DB.dailyLearned.has(id)) {
          DB.learned.delete(id);
          delete DB.srs[id];
          needsSave = true;
        }
      });

      // ── Backfill: words learned before historyWords tracking existed ─────────
      // Only backfill if dailyQueueDate is today, otherwise dailyLearned
      // contains stale words from a previous day.
      const tk = todayKey();
      if (DB.dailyLearned.size > 0 && DB.dailyQueueDate === today()) {
        if (!DB.historyWords[tk]) DB.historyWords[tk] = [];
        DB.dailyLearned.forEach(id => {
          if (!DB.historyWords[tk].includes(id)) { DB.historyWords[tk].push(id); needsSave = true; }
        });
      }

      if (needsSave) save();
    }

    function save() {
      const json = JSON.stringify(dbToObj());
      try { localStorage.setItem(SKEY, json); } catch (e) { }
      try { if (window.storage) window.storage.set(SKEY, json); } catch (e) { }
    }
    function today() { return new Date().toDateString(); }
    function todayKey() { const d = new Date(); return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`; }
    function updateStreak() {
      const t = today();
      if (DB.lastStudy === t) return;
      const y = new Date(Date.now() - 86400000).toDateString();
      if (DB.lastStudy === y) DB.streak++; else if (DB.lastStudy !== t) DB.streak = 1;
      DB.lastStudy = t; save();
    }
    function shuffle(a) { return [...a].sort(() => Math.random() - .5); }

    // ══════════════════════════════════════════════
    // SPACED REPETITION (SRS) — Anki/SM-2 Inspired
    // ══════════════════════════════════════════════
    // Review intervals by level (in days).
    // Level 0 = "new/reset" — first encounter or hard reset
    // "Got it" promotes one level; "Still learning" drops one level (min 0).
    // Intervals follow an expanding schedule similar to Anki:
    //   Level 0 → review in 1 day
    //   Level 1 → review in 3 days
    //   Level 2 → review in 7 days
    //   Level 3 → review in 14 days
    //   Level 4 → review in 30 days
    //   Level 5 → review in 60 days
    //   Level 6 → review in 90 days (mastered)
    const SRS_INTERVALS = [1, 3, 7, 14, 30, 60, 90]; // days per level

    function todayISO() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }
    function addDaysISO(days) {
      const d = new Date(Date.now() + days * 86400000);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    // Human-readable label for when next review is due
    function srsNextLabel(id) {
      const srs = DB.srs[id];
      if (!srs || !srs.nextReview) return '';
      const today = new Date(todayISO());
      const next = new Date(srs.nextReview);
      const diffMs = next - today;
      const diffDays = Math.round(diffMs / 86400000);
      if (diffDays <= 0) return 'due today';
      if (diffDays === 1) return 'due tomorrow';
      if (diffDays < 7) return `in ${diffDays} days`;
      if (diffDays < 30) return `in ${Math.round(diffDays / 7)} week${Math.round(diffDays / 7) > 1 ? 's' : ''}`;
      return `in ${Math.round(diffDays / 30)} month${Math.round(diffDays / 30) > 1 ? 's' : ''}`;
    }

    // Core scheduling: called on EVERY practice answer (not just SRS mode)
    function srsSchedule(id, gotIt) {
      if (!DB.srs[id]) DB.srs[id] = { interval: 0, ease: 2.5, level: 0, nextReview: null, lastReview: null };
      const card = DB.srs[id];
      card.lastReview = todayISO();
      
      // Ensure ease is initialized for older data
      if (!card.ease) card.ease = 2.5;
      
      if (gotIt) {
        // Anki logic for correct answer
        if (card.interval === 0 || card.interval === undefined) {
          card.interval = 1;
        } else if (card.interval === 1) {
          card.interval = 6;
        } else {
          card.interval = Math.round(card.interval * card.ease);
        }
      } else {
        // Anki logic for incorrect answer (lapse)
        card.interval = 1;
        card.ease = Math.max(1.3, card.ease - 0.20);
      }
      
      // Calculate a "level" for the UI dots (approximating intervals: 1, 3, 7, 14, 30, 60, 90)
      if (card.interval <= 1) card.level = 0;
      else if (card.interval < 7) card.level = 1;
      else if (card.interval < 14) card.level = 2;
      else if (card.interval < 30) card.level = 3;
      else if (card.interval < 60) card.level = 4;
      else if (card.interval < 90) card.level = 5;
      else card.level = 6;

      card.nextReview = addDaysISO(card.interval);
      save();
    }

    // Get IDs of learned cards that are due for review today or overdue
    function getSrsReviewIds() {
      const td = todayISO();
      return Object.entries(DB.srs)
        .filter(([id, data]) => DB.learned.has(id) && data.nextReview && data.nextReview <= td)
        .map(([id]) => id);
    }

    function getSrsLevel(id) { return (DB.srs[id] || {}).level || 0; }

    // Check if a card is scheduled for future review (not due yet)
    function isSrsScheduledFuture(id) {
      const srs = DB.srs[id];
      if (!srs || !srs.nextReview) return false;
      return srs.nextReview > todayISO();
    }

    // Track cards answered "Got it" in the current browser session
    // so they never reappear until the page is refreshed / next day
    let _sessionGotIt = new Set();

    // ══════════════════════════════════════════════
    // GRAMMAR TAG AUTO-DETECTION
    // ══════════════════════════════════════════════
    function grammarTag(de) {
      const s = de.toLowerCase();
      if (/\b(muss|müssen|kann|könn|darf|dürfen|soll|sollen|will(?!kommen|kommen)|wollen|mag(?! )|mögen|möchte|möchten|würde|würden)\b/.test(s))
        return { t: 'Modal', c: '#7C3AED', bg: '#F5F3FF' };
      if (/\b(habe|hat|hast|haben|habt|bin|bist|ist|sind|seid|war|waren)\b/.test(s) && /\bge[a-zäöüß]{2,}(t|en)\b/.test(s))
        return { t: 'Perfekt', c: '#2563EB', bg: '#EFF6FF' };
      if (/^(wo |wer |was |wann |wie |woher |wohin |welch|warum )/.test(s))
        return { t: 'W-Frage', c: '#EA580C', bg: '#FFF7ED' };
      if (/\b(nicht|kein|keine|keinen|keiner|keines|keinem)\b/.test(s))
        return { t: 'Negation', c: '#DC2626', bg: '#FEF2F2' };
      if (/\bseit\b/.test(s))
        return { t: 'seit + Dativ', c: '#D97706', bg: '#FFFBEB' };
      return null;
    }

    // Daily queue: only picks cards that are NOT already scheduled for future SRS
    function ensureDailyQueue() {
      const t = today();
      if (DB.dailyQueueDate === t && DB.dailyQueue.length > 0) {
        // Same day and queue exists — never change it. Only a new day or "New batch" should alter it.
        return;
      }
      if (DB.dailyQueueDate !== t) { DB.dailyLearned = new Set(); _sessionGotIt = new Set(); }
      // Prioritize unlearned cards, then add learned cards that are NOT scheduled for future review
      const unlearned = shuffle(SENTENCES.filter(s => !DB.learned.has(s.id) && !isSrsScheduledFuture(s.id)));
      const learnedDue = shuffle(SENTENCES.filter(s => DB.learned.has(s.id) && !isSrsScheduledFuture(s.id)));
      const pool = [...unlearned, ...learnedDue];
      DB.dailyQueue = pool.slice(0, DB.dailyGoal).map(s => s.id);
      DB.dailyQueueDate = t;
      // Restore dailyLearned from historyWords so it's accurate after a goal change or queue refresh
      const todayWordIds = (DB.historyWords[todayKey()] || []).filter(id => DB.learned.has(id));
      if (todayWordIds.length > 0) DB.dailyLearned = new Set(todayWordIds);
      save();
    }

    // ══════════════════════════════════════════════
    // STATE
    // ══════════════════════════════════════════════
    let V = { view: 'today', topicId: null, filter: 'all', query: '', speaking: null, libTab: 'saved', patFilter: 'all', historyDay: null };

    // ══════════════════════════════════════════════
    // PATTERN DETECTION FOR SENTENCES
    // ══════════════════════════════════════════════
    function findMatchingPattern(sentence) {
      const de = sentence.de.toLowerCase();
      // Check each pattern to see if the sentence structure matches
      const matchers = [
        { pid: 'p4', test: s => /^kannst du /i.test(s) },
        { pid: 'p3', test: s => /^können sie /i.test(s) },
        { pid: 'p1', test: s => /^ich hätte gern/i.test(s) },
        { pid: 'p2', test: s => /^einmal .+, bitte/i.test(s) },
        { pid: 'p5', test: s => /^ich möchte /i.test(s) },
        { pid: 'p6', test: s => /^wo ist /i.test(s) },
        { pid: 'p7', test: s => /^wo finde ich /i.test(s) },
        { pid: 'p8', test: s => /^wie komme ich /i.test(s) },
        { pid: 'p9', test: s => /^ich brauche /i.test(s) },
        { pid: 'p10', test: s => /^ich suche /i.test(s) },
        { pid: 'p11', test: s => /^haben sie /i.test(s) },
        { pid: 'p12', test: s => /\bseit \w+ (tagen|wochen|monaten|jahren)\b/i.test(s) || /^seit wann/i.test(s) },
        { pid: 'p15', test: s => / funktioniert nicht/i.test(s) },
        { pid: 'p16', test: s => / ist kaputt/i.test(s) },
        { pid: 'p17', test: s => /ich habe .+ verloren/i.test(s) },
        { pid: 'p18', test: s => /^es gibt ein problem/i.test(s) },
        { pid: 'p19', test: s => /^ich bin \w+\.?$/i.test(s) },
        { pid: 'p20', test: s => /^mir ist /i.test(s) },
        { pid: 'p21', test: s => /ich habe \w*schmerzen/i.test(s) },
        { pid: 'p22', test: s => /das macht mir /i.test(s) },
        { pid: 'p23', test: s => /ich habe .+ge\w+(t|en)\b/i.test(s) },
        { pid: 'p24', test: s => /^ich war /i.test(s) },
        { pid: 'p26', test: s => /^ich werde /i.test(s) },
        { pid: 'p28', test: s => /^wollen wir /i.test(s) },
        { pid: 'p29', test: s => /^ich finde /i.test(s) },
        { pid: 'p31', test: s => /das gefällt mir/i.test(s) },
        { pid: 'p32', test: s => /^entschuldigung/i.test(s) },
        { pid: 'p33', test: s => /^es tut mir leid/i.test(s) },
        { pid: 'p34', test: s => /^darf ich /i.test(s) },
        { pid: 'p37', test: s => /^bitte \w+en sie /i.test(s) },
        { pid: 'p38', test: s => /gibt es .+ in der nähe/i.test(s) },
      ];
      for (const m of matchers) {
        if (m.test(de)) {
          const pattern = PATTERNS.find(p => p.id === m.pid);
          if (pattern) return pattern;
        }
      }
      return null;
    }
    function nav(view, extra) { V.view = view; if (extra) V.topicId = extra; V.filter = 'all'; V.query = ''; render(); window.scrollTo(0, 0); }

    // ══════════════════════════════════════════════
    // ICONS
    // ══════════════════════════════════════════════
    const ICO = {
      speak: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`,
      check: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`,
      star: `<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
    };

    // ══════════════════════════════════════════════
    // RENDER
    // ══════════════════════════════════════════════
    function render() {
      updateHeader();
      updateNavBtns();
      const root = document.getElementById('root');
      if (V.view === 'today') root.innerHTML = renderToday();
      else if (V.view === 'browse' && V.topicId) root.innerHTML = renderTopic();
      else if (V.view === 'browse') root.innerHTML = renderBrowse();
      else if (V.view === 'patterns') root.innerHTML = renderPatterns();
      else if (V.view === 'saved') root.innerHTML = renderSaved();
      else if (V.view === 'history') root.innerHTML = renderHistory();
      else if (V.view === 'history-day') root.innerHTML = renderHistoryDay();
      else if (V.view === 'stats') { root.innerHTML = renderStats(); }
      root.querySelectorAll('.sc,.pc').forEach((el, i) => el.style.animationDelay = i * 25 + 'ms');
    }

    function updateHeader() {
      const tot = SENTENCES.length, done = DB.learned.size, pct = tot ? Math.round(done / tot * 100) : 0;
      document.getElementById('hpf').style.width = pct + '%';

    // ─── TODAY ───────────────────────────────────
    function renderToday() {
      ensureDailyQueue();
      const qs = DB.dailyQueue.map(id => SENTENCES.find(s => s.id === id)).filter(Boolean);
      const lt = DB.dailyLearned.size;
      const tot = qs.length, pct = tot ? Math.round(lt / tot * 100) : 0, done = lt === tot && tot > 0;

      const gc = `<div class="goal-card">

  </div>`;

      return `${gc}
